<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Maison Marini ✕ lil Thalis | Hub</title>
  <style>
    /* ==========================================================================
       Variáveis e Estética Apple (Ajustada para Fluidez)
       ========================================================================== */
    :root {
      --bg-color: #f5f5f7;
      --card-bg: rgba(255, 255, 255, 0.85);
      --text-main: #1d1d1f;
      --text-muted: #86868b;
      --font-family: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", sans-serif;
      --radius: 24px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: var(--font-family);
      background-color: var(--bg-color);
      color: var(--text-main);
      -webkit-font-smoothing: antialiased;
      padding-bottom: 80px;
    }

    /* ==========================================================================
       Hero Section (Topo Imersivo)
       ========================================================================== */
    .hero {
      position: relative;
      height: 48vh;
      min-height: 400px;
      background: linear-gradient(to bottom, rgba(245,245,247,0) 40%, rgba(245,245,247,1) 100%), 
                  url('https://images.unsplash.com/photo-1490481651871-ab68de25d43d?q=80&w=2070&auto=format&fit=crop') center/cover no-repeat;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      align-items: center;
      padding-bottom: 30px;
      text-align: center;
    }

    .hero-title {
      font-size: clamp(2.2rem, 4vw, 3.8rem);
      font-weight: 600;
      letter-spacing: -0.03em;
      margin-bottom: 16px;
      color: var(--text-main);
    }

    /* Redes Sociais (Agora com links interativos reais) */
    .social-links {
      display: flex;
      gap: 16px;
      margin-bottom: 10px;
    }

    .social-links a {
      width: 44px;
      height: 44px;
      background: var(--text-main);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 0.8rem;
      font-weight: bold;
      text-decoration: none;
      transition: transform 0.2s ease, background 0.2s ease;
    }

    .social-links a:hover { 
      transform: scale(1.08); 
      background: #333;
    }

    /* ==========================================================================
       Conteúdo Principal (Expandido para monitores grandes)
       ========================================================================== */
    .content-wrapper {
      width: min(90vw, 920px); /* Ocupa o espaço ideal sem esticar demais */
      margin: 0 auto;
      padding: 0 20px;
      display: flex;
      flex-direction: column;
      gap: 40px;
    }

    .section-title {
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.15em;
      color: var(--text-muted);
      font-weight: 700;
      margin-bottom: 16px;
      padding-left: 8px;
    }

    /* Grade Inteligente: 1 coluna no celular, 2 colunas no PC */
    .links-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 16px;
    }

    @media(min-width: 768px) {
      .links-grid {
        grid-template-columns: 1fr 1fr;
      }
    }

    /* Cartões de Links */
    .link-card {
      display: flex;
      align-items: center;
      background: var(--card-bg);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      padding: 18px;
      border-radius: var(--radius);
      text-decoration: none;
      color: var(--text-main);
      box-shadow: 0 10px 30px rgba(0,0,0,0.03);
      border: 1px solid rgba(255,255,255,0.6);
      transition: transform 0.3s cubic-bezier(.19,1,.22,1), box-shadow 0.3s cubic-bezier(.19,1,.22,1);
    }

    .link-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 16px 40px rgba(0,0,0,0.07);
    }

    .link-image {
      width: 72px;
      height: 72px;
      border-radius: 16px;
      background-color: #ddd;
      margin-right: 18px;
      object-fit: cover;
      flex-shrink: 0;
    }

    .link-text h3 {
      font-size: 1.15rem;
      font-weight: 600;
      margin-bottom: 4px;
      letter-spacing: -0.01em;
    }

    .link-text p {
      font-size: 0.9rem;
      color: var(--text-muted);
    }

    /* Cartão de Vídeo */
    .video-card {
      width: 100%;
      aspect-ratio: 16/9;
      background: #000;
      border-radius: var(--radius);
      overflow: hidden;
      position: relative;
      box-shadow: 0 14px 40px rgba(0,0,0,0.08);
    }

    .video-card img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      opacity: 0.85;
    }

    .play-button {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 68px;
      height: 68px;
      background: rgba(255,255,255,0.92);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: transform 0.3s ease;
    }

    .video-card:hover .play-button {
      transform: translate(-50%, -50%) scale(1.08);
    }

    .play-button::after {
      content: '';
      border-style: solid;
      border-width: 10px 0 10px 16px;
      border-color: transparent transparent transparent var(--text-main);
      margin-left: 4px;
    }
  </style>
</head>
<body>

  <!-- Topo com a imagem imersiva -->
  <header class="hero">
    <h1 class="hero-title">Maison Marini ✕ lil Thalis</h1>
    <div class="social-links">
      <a href="https://instagram.com" target="_blank">IG</a>
      <a href="https://tiktok.com" target="_blank">TT</a>
      <a href="https://youtube.com" target="_blank">YT</a>
    </div>
  </header>

  <main class="content-wrapper">
    
    <!-- Seção de Ações Principais -->
    <section>
      <h2 class="section-title">O Futuro</h2>
      <div class="links-grid">
        <a href="#" class="link-card">
          <img src="https://images.unsplash.com/photo-1542601906990-b4d3fb778b09?q=80&w=200&auto=format&fit=crop" class="link-image" alt="Relatório 2030">
          <div class="link-text">
            <h3>Missão Carbono Zero 2030</h3>
            <p>Leia nosso manifesto sustentável</p>
          </div>
        </a>

        <a href="#" class="link-card">
          <img src="https://images.unsplash.com/photo-1550639525-c97d455acf70?q=80&w=200&auto=format&fit=crop" class="link-image" alt="Loja">
          <div class="link-text">
            <h3>Coleção Cápsula Reciclada</h3>
            <p>Disponível na loja oficial</p>
          </div>
        </a>
      </div>
    </section>

    <!-- Seção de Mídia -->
    <section>
      <h2 class="section-title">Campanha Visual</h2>
      <div class="video-card">
        <img src="https://images.unsplash.com/photo-1492684223066-81342ee5ff30?q=80&w=1000&auto=format&fit=crop" alt="Video cover">
        <div class="play-button"></div>
      </div>
    </section>

  </main>

</body>
</html>
